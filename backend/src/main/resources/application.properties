spring.application.name=chatting-app
server.port=8080

spring.data.mongodb.uri=mongodb://localhost:27017/chatting_app
spring.data.mongodb.auto-index-creation=${MONGODB_AUTO_INDEX_CREATION:true}
spring.messages.basename=messages
spring.messages.encoding=UTF-8
spring.messages.fallback-to-system-locale=false
spring.servlet.multipart.max-file-size=${MEDIA_MAX_FILE_SIZE:10MB}
spring.servlet.multipart.max-request-size=${MEDIA_MAX_FILE_SIZE:10MB}

app.cors.allowed-origins=http://localhost:5173,http://127.0.0.1:5173
app.auth.token-hours=${AUTH_TOKEN_HOURS:2}
app.auth.cookie-secure=${AUTH_COOKIE_SECURE:false}
app.auth.login-max-attempts=${AUTH_LOGIN_MAX_ATTEMPTS:5}
app.auth.login-lock-seconds=${AUTH_LOGIN_LOCK_SECONDS:300}
app.auth.direct-registration-enabled=${DIRECT_REGISTRATION_ENABLED:false}

app.verification.otp-minutes=${OTP_MINUTES:10}
app.verification.max-attempts=${OTP_MAX_ATTEMPTS:5}
app.verification.resend-cooldown-seconds=${OTP_RESEND_COOLDOWN_SECONDS:60}
app.verification.daily-limit=${OTP_DAILY_LIMIT:10}

# Use "dummy" for local development. Use "twilio" for real SMS delivery.
app.sms.provider=${SMS_PROVIDER:dummy}
app.sms.twilio.account-sid=${TWILIO_ACCOUNT_SID:}
app.sms.twilio.auth-token=${TWILIO_AUTH_TOKEN:}
app.sms.twilio.from-number=${TWILIO_FROM_NUMBER:}

app.media.minio.endpoint=${MINIO_ENDPOINT:http://localhost:9000}
app.media.minio.public-endpoint=${MINIO_PUBLIC_ENDPOINT:${MINIO_ENDPOINT:http://localhost:9000}}
app.media.minio.access-key=${MINIO_ACCESS_KEY:}
app.media.minio.secret-key=${MINIO_SECRET_KEY:}
app.media.minio.bucket=${MINIO_BUCKET:chat-media}
app.media.max-bytes=${MEDIA_MAX_BYTES:10485760}
app.media.presigned-url-minutes=${MEDIA_PRESIGNED_URL_MINUTES:30}

springdoc.swagger-ui.enabled=${SWAGGER_ENABLED:false}
springdoc.api-docs.enabled=${SWAGGER_ENABLED:false}
