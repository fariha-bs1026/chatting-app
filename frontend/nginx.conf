server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Content-Security-Policy "default-src 'self'; connect-src 'self' http://localhost:8080 ws://localhost:8080 http://localhost:9000; img-src 'self' data: blob: http://localhost:9000; media-src 'self' blob: http://localhost:9000; style-src 'self' 'unsafe-inline'; script-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'" always;

  location / {
    try_files $uri $uri/ /index.html;
  }
}
