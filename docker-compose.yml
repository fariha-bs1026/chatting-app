services:
  backend:
    build:
      context: ./backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://host.docker.internal:27017/chatting_app
      APP_CORS_ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173,http://localhost:3000,http://127.0.0.1:3000
      MONGODB_AUTO_INDEX_CREATION: "true"
      AUTH_TOKEN_HOURS: "2"
      AUTH_COOKIE_SECURE: "false"
      AUTH_LOGIN_MAX_ATTEMPTS: "5"
      AUTH_LOGIN_LOCK_SECONDS: "300"
      DIRECT_REGISTRATION_ENABLED: "false"
      OTP_MINUTES: "10"
      OTP_MAX_ATTEMPTS: "5"
      OTP_RESEND_COOLDOWN_SECONDS: "60"
      OTP_DAILY_LIMIT: "10"
      SMS_PROVIDER: dummy
      MINIO_ENDPOINT: http://minio:9000
      MINIO_PUBLIC_ENDPOINT: http://localhost:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-chatflow-dev-access}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-chatflow-dev-secret-change-me}
      MINIO_BUCKET: chat-media
      MEDIA_MAX_FILE_SIZE: 10MB
      MEDIA_MAX_BYTES: "10485760"
      MEDIA_PRESIGNED_URL_MINUTES: "30"
      SWAGGER_ENABLED: "true"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - minio

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8080/api
        VITE_WS_URL: http://localhost:8080/ws
    ports:
      - "3000:80"
    depends_on:
      - backend

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-chatflow-dev-access}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-chatflow-dev-secret-change-me}
    volumes:
      - minio_data:/data

volumes:
  minio_data:
